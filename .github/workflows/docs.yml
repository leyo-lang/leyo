name: Generate Documentation

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  docs:
    name: Build and Deploy Documentation
    runs-on: ubuntu-latest

    steps:
      # ---------------------------------------------------------
      # 1. Checkout Leyo
      # ---------------------------------------------------------
      - name: Checkout Leyo
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      # ---------------------------------------------------------
      # 2. Install Doxygen
      # ---------------------------------------------------------
      - name: Install Doxygen
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen

      # ---------------------------------------------------------
      # 3. Generate Documentation
      # ---------------------------------------------------------
      - name: Generate Documentation
        run: |
          doxygen docs/Doxyfile

      # ---------------------------------------------------------
      # 4. Generate GitHub App Token
      # ---------------------------------------------------------
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.DOCS_APP_ID }}
          private-key: ${{ secrets.DOCS_APP_PRIVATE_KEY }}
          owner: leyo-lang
          repositories: docs

      # ---------------------------------------------------------
      # 5. Checkout docs repository
      # ---------------------------------------------------------
      - name: Checkout Documentation Repository
        uses: actions/checkout@v4
        with:
          repository: leyo-lang/docs
          token: ${{ steps.app-token.outputs.token }}
          path: docs-repo
          persist-credentials: false

      # ---------------------------------------------------------
      # 6. Synchronise generated documentation
      # ---------------------------------------------------------
      - name: Synchronise Documentation
        run: |
          rsync -av --delete \
            --exclude="README.md" \
            --exclude="LICENSE" \
            --exclude=".nojekyll" \
            docs/html/ docs-repo/

      # ---------------------------------------------------------
      # 7. Commit and Push Documentation
      # ---------------------------------------------------------
      - name: Commit and Push Documentation
        working-directory: docs-repo
        env:
          DOCS_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config user.name "Leyo Documentation Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote set-url origin \
            "https://x-access-token:${DOCS_TOKEN}@github.com/leyo-lang/docs.git"

          git add -A

          git commit -m "docs: update generated documentation" \
            || echo "No documentation changes to commit"

          git push origin main